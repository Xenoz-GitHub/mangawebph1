<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Manga - MangaWebPH</title>
    <link rel="icon" type="image/png" href="../images/mangawebph.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <link rel="stylesheet" href="../css/animations.css">
    <style>
        .search-page {
            padding: 100px 2rem 4rem;
            min-height: 100vh;
        }
        
        .search-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .search-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .search-header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .search-box {
            max-width: 600px;
            margin: 2rem auto;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            padding-right: 5rem;
            border: 3px solid rgba(108,92,231,0.2);
            border-radius: 50px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            background: white;
        }
        
        body.night-mode .search-box input {
            background: var(--card-bg-dark);
            color: white;
            border-color: rgba(255,255,255,0.1);
        }
        
        .search-box input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 4px rgba(108,92,231,0.1);
        }
        
        .search-box button {
            position: absolute;
            right: 5px;
            top: 5px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .search-box button:hover {
            transform: scale(1.1);
        }
        
        .search-filters {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        body.night-mode .search-filters {
            background: var(--card-bg-dark);
        }
        
        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .filter-group label {
            font-weight: 600;
            color: #666;
        }
        
        .filter-group select,
        .filter-group input {
            padding: 0.8rem;
            border: 2px solid rgba(108,92,231,0.2);
            border-radius: 10px;
            background: transparent;
            transition: all 0.3s ease;
        }
        
        body.night-mode .filter-group select,
        body.night-mode .filter-group input {
            color: white;
            border-color: rgba(255,255,255,0.1);
        }
        
        .filter-group select:focus,
        .filter-group input:focus {
            border-color: var(--primary-color);
            outline: none;
        }
        
        .filter-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }
        
        .filter-actions button {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .apply-filters {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
        }
        
        .reset-filters {
            background: rgba(108,92,231,0.1);
            color: var(--primary-color);
        }
        
        .filter-actions button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(108,92,231,0.2);
        }
        
        .search-results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .results-count {
            font-size: 1.1rem;
            color: #666;
        }
        
        .results-count span {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.3rem;
        }
        
        .sort-options {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .sort-options select {
            padding: 0.5rem 1rem;
            border: 2px solid rgba(108,92,231,0.2);
            border-radius: 30px;
            background: transparent;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .manga-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        
        body.night-mode .manga-card {
            background: var(--card-bg-dark);
        }
        
        .manga-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(108,92,231,0.2);
        }
        
        .manga-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }
        
        .manga-info {
            padding: 1rem;
        }
        
        .manga-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        
        .manga-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--primary-color);
        }
        
        .match-highlight {
            background: rgba(108,92,231,0.1);
            padding: 0.2rem;
            border-radius: 4px;
        }
        
        .recent-searches {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        body.night-mode .recent-searches {
            background: var(--card-bg-dark);
        }
        
        .recent-searches h3 {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .recent-tags {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        
        .recent-tag {
            padding: 0.5rem 1.2rem;
            background: rgba(108,92,231,0.1);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .recent-tag:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .no-results {
            text-align: center;
            padding: 4rem;
            grid-column: 1/-1;
        }
        
        .no-results i {
            font-size: 4rem;
            color: #ccc;
            margin-bottom: 1rem;
        }
        
        .no-results h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .no-results p {
            color: #666;
        }
        
        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 15px;
            margin-top: 0.5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 100;
            display: none;
        }
        
        body.night-mode .search-suggestions {
            background: var(--card-bg-dark);
        }
        
        .search-suggestions.show {
            display: block;
        }
        
        .suggestion-item {
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .suggestion-item:hover {
            background: rgba(108,92,231,0.1);
        }
        
        .suggestion-item i {
            color: var(--primary-color);
            width: 20px;
        }
        
        .suggestion-item span {
            flex: 1;
        }
        
        .suggestion-category {
            font-size: 0.8rem;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .search-page {
                padding: 80px 1rem 2rem;
            }
            
            .search-header h1 {
                font-size: 2rem;
            }
            
            .filters-grid {
                grid-template-columns: 1fr;
            }
            
            .filter-actions {
                flex-direction: column;
            }
            
            .search-results-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .results-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
            
            .manga-card img {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">

                    <img src="../images/logo.png" alt="MangaWebPH Logo" class="circular-logo">

            </div>
            
            <div class="nav-center" id="navLinks">

                    <i class="fas fa-moon"></i>
                </button>

                    <a href="signin.html" class="btn-secondary">Sign In</a>
                    <a href="signup.html" class="btn-primary">Sign Up</a>
                </div>
                <div class="user-menu hidden" id="userMenu">
                    <img src="../images/default-avatar.png" alt="User" class="user-avatar circular-avatar" id="userAvatar">

                        <a href="profile.html">Profile</a>

    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="../index.html" class="mobile-link">Home</a>
        <a href="manga.html" class="mobile-link">Manga</a>
        <a href="leaderboard.html" class="mobile-link">Leaderboard</a>
        <a href="tasks.html" class="mobile-link">Tasks</a>
        <a href="donate.html" class="mobile-link">Donate</a>
        <a href="profile.html" class="mobile-link">Profile</a>
        <a href="dashboard.html" class="mobile-link">Dashboard</a>
    </div>

    <main class="search-page">
        <div class="search-container">
            <div class="search-header">
                <h1>Search Manga</h1>
                <p>Find your next favorite manga</p>
            </div>
            
            <!-- Search Box -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by title, author, genre..." autocomplete="off">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
                
                <!-- Search Suggestions -->
                <div class="search-suggestions" id="searchSuggestions"></div>
            </div>
            
            <!-- Recent Searches -->
            <div class="recent-searches" id="recentSearches">
                <h3><i class="fas fa-history"></i> Recent Searches</h3>
                <div class="recent-tags" id="recentTags"></div>
            </div>
            
            <!-- Advanced Filters -->
            <div class="search-filters">
                <h3 style="margin-bottom: 1rem;">Advanced Filters</h3>
                <div class="filters-grid">
                    <div class="filter-group">
                        <label>Genre</label>
                        <select id="genreFilter">
                            <option value="">All Genres</option>
                            <option value="action">Action</option>
                            <option value="adventure">Adventure</option>
                            <option value="comedy">Comedy</option>
                            <option value="drama">Drama</option>
                            <option value="fantasy">Fantasy</option>
                            <option value="romance">Romance</option>
                            <option value="sci-fi">Sci-Fi</option>
                            <option value="slice-of-life">Slice of Life</option>
                            <option value="horror">Horror</option>
                            <option value="mystery">Mystery</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Status</label>
                        <select id="statusFilter">
                            <option value="">All</option>
                            <option value="ongoing">Ongoing</option>
                            <option value="completed">Completed</option>
                            <option value="hiatus">Hiatus</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Rating</label>
                        <select id="ratingFilter">
                            <option value="">Any Rating</option>
                            <option value="4">4+ Stars</option>
                            <option value="3">3+ Stars</option>
                            <option value="2">2+ Stars</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label>Year</label>
                        <input type="number" id="yearFilter" placeholder="Release year" min="1900" max="2026">
                    </div>
                </div>
                
                <div class="filter-actions">
                    <button class="reset-filters" onclick="resetFilters()">Reset Filters</button>
                    <button class="apply-filters" onclick="applyFilters()">Apply Filters</button>
                </div>
            </div>
            
            <!-- Search Results Header -->
            <div class="search-results-header">
                <div class="results-count" id="resultsCount">
                    <span id="resultCount">0</span> results found
                </div>
                
                <div class="sort-options">
                    <label for="sortBy">Sort by:</label>
                    <select id="sortBy" onchange="applySort()">
                        <option value="relevance">Relevance</option>
                        <option value="latest">Latest</option>
                        <option value="popular">Most Popular</option>
                        <option value="rating">Highest Rated</option>
                        <option value="title">Title A-Z</option>
                    </select>
                </div>
            </div>
            
            <!-- Results Grid -->
            <div class="results-grid" id="resultsGrid">
                <!-- Will be populated by JS -->
            </div>
            
            <!-- Load More Button -->
            <div style="text-align: center; margin-top: 2rem;">
                <button class="btn-primary" id="loadMoreBtn" onclick="loadMore()" style="display: none;">
                    Load More Results
                </button>
            </div>
        </div>
    </main>

    <!-- Floating Components -->
    <div class="chatbot-container" id="chatbotContainer">
        <!-- ... chatbot content ... -->
    </div>
    
    <button class="back-to-top" id="backToTop">
        <i class="fas fa-arrow-up"></i>

</body>
