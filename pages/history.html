<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading History - MangaWebPH</title>
    <link rel="icon" type="image/png" href="../images/mangawebph.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <link rel="stylesheet" href="../css/animations.css">
    <style>
        .history-page {
            padding: 100px 2rem 4rem;
            min-height: 100vh;
        }
        
        .history-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 2rem;
        }
        
        .page-header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-actions {
            display: flex;
            gap: 1rem;
        }
        
        .clear-btn {
            padding: 0.8rem 1.5rem;
            border: 2px solid #d63031;
            border-radius: 30px;
            background: transparent;
            color: #d63031;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .clear-btn:hover {
            background: #d63031;
            color: white;
        }
        
        .export-btn {
            padding: 0.8rem 1.5rem;
            border: 2px solid var(--primary-color);
            border-radius: 30px;
            background: transparent;
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .export-btn:hover {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border-color: transparent;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }
        
        body.night-mode .stat-card {
            background: var(--card-bg-dark);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 0.3rem;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .timeline-filter {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .timeline-btn {
            padding: 0.8rem 1.5rem;
            border: 2px solid rgba(108,92,231,0.2);
            border-radius: 30px;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .timeline-btn:hover,
        .timeline-btn.active {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border-color: transparent;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .history-item {
            background: white;
            border-radius: 15px;
            padding: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            gap: 1rem;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }
        
        body.night-mode .history-item {
            background: var(--card-bg-dark);
        }
        
        .history-item:hover {
            transform: translateX(10px);
            box-shadow: 0 10px 20px rgba(108,92,231,0.2);
        }
        
        .history-cover {
            width: 60px;
            height: 80px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .history-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .history-info {
            flex: 1;
        }
        
        .history-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        
        .history-meta {
            display: flex;
            gap: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        
        .history-meta i {
            color: var(--primary-color);
            margin-right: 0.3rem;
        }
        
        .history-progress {
            width: 150px;
        }
        
        .progress-bar {
            height: 4px;
            background: rgba(108,92,231,0.2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 0.3rem;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            width: 0%;
        }
        
        .progress-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: right;
        }
        
        .history-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .history-action-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: rgba(108,92,231,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .history-action-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: scale(1.1);
        }
        
        .history-action-btn.delete:hover {
            background: #d63031;
        }
        
        .empty-history {
            text-align: center;
            padding: 4rem;
        }
        
        .empty-history i {
            font-size: 4rem;
            color: #ccc;
            margin-bottom: 1rem;
        }
        
        .empty-history h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .empty-history p {
            color: #666;
            margin-bottom: 2rem;
        }
        
        .loading-skeleton {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .skeleton-item {
            height: 100px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 15px;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        @media (max-width: 768px) {
            .history-page {
                padding: 80px 1rem 2rem;
            }
            
            .page-header h1 {
                font-size: 2rem;
            }
            
            .header-actions {
                width: 100%;
            }
            
            .clear-btn, .export-btn {
                flex: 1;
                justify-content: center;
            }
            
            .history-item {
                flex-wrap: wrap;
            }
            
            .history-progress {
                width: 100%;
            }
            
            .history-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar"><!-- ... --></nav>
    
    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu"><!-- ... --></div>

    <main class="history-page">
        <div class="history-container">
            <div class="page-header">
                <h1><i class="fas fa-history"></i> Reading History</h1>
                <div class="header-actions">
                    <button class="export-btn" onclick="exportHistory()">
                        <i class="fas fa-download"></i> Export
                    </button>
                    <button class="clear-btn" onclick="clearHistory()">
                        <i class="fas fa-trash"></i> Clear
                    </button>
                </div>
            </div>
            
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalChapters">0</div>
                    <div class="stat-label">Chapters Read</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalManga">0</div>
                    <div class="stat-label">Manga Read</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="readingTime">0</div>
                    <div class="stat-label">Hours Reading</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgPerDay">0</div>
                    <div class="stat-label">Avg/Day</div>
                </div>
            </div>
            
            <!-- Timeline Filter -->
            <div class="timeline-filter">
                <button class="timeline-btn active" data-timeline="all">All Time</button>
                <button class="timeline-btn" data-timeline="today">Today</button>
                <button class="timeline-btn" data-timeline="week">This Week</button>
                <button class="timeline-btn" data-timeline="month">This Month</button>
                <button class="timeline-btn" data-timeline="year">This Year</button>
            </div>
            
            <!-- History List -->
            <div class="history-list" id="historyList">
                <div class="loading-skeleton">
                    <div class="skeleton-item"></div>
                    <div class="skeleton-item"></div>
                    <div class="skeleton-item"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Floating Components -->
    <div class="chatbot-container" id="chatbotContainer"><!-- ... --></div>
    <button class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></button>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/chatbot.js"></script>
    <script src="../js/pages/history.js"></script>
</body>
</html>
