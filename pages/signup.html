<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MangaWebPH</title>
    <link rel="icon" type="image/png" href="../images/mangawebph.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
     <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <link rel="stylesheet" href="../css/animations.css">
    <style>
        /* Same styles as signin page plus additional */
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: rgba(0,0,0,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .strength-bar.weak {
            width: 33.33%;
            background: #d63031;
        }
        
        .strength-bar.medium {
            width: 66.66%;
            background: #fdcb6e;
        }
        
        .strength-bar.strong {
            width: 100%;
            background: #00b894;
        }
        
        .terms-agreement {
            margin: 1.5rem 0;
        }
        
        .terms-agreement label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        
        .terms-agreement a {
            color: var(--primary-color);
            text-decoration: none;
        }
        
        .username-suggestions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        
        .username-suggestion {
            padding: 0.3rem 0.8rem;
            background: rgba(108,92,231,0.1);
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .username-suggestion:hover {
            background: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <!-- Left Side with Luffy -->
            <div class="auth-side">
                <div class="auth-side-content">
                    <h2>Join Our Community!</h2>
                    <p>Start your manga adventure today</p>
                    <img src="../images/luffy.png" alt="Luffy" class="auth-side-image">
                </div>
            </div>
            
            <!-- Right Side - Sign Up Form -->
            <div class="auth-form-container">
                <div class="auth-form">
                    <h1>Create Account</h1>
                    <p class="auth-subtitle">Join thousands of manga readers!</p>
                    
                    <form id="signupForm">
                        <div class="form-group">
                            <label>Username</label>
                            <div class="input-group">
                                <i class="fas fa-user"></i>
                                <input type="text" id="username" placeholder="Choose a username" required>
                            </div>
                            <div class="username-suggestions" id="usernameSuggestions"></div>
                        </div>
                        
                        <div class="form-group">
                            <label>Email</label>
                            <div class="input-group">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="email" placeholder="Enter your email" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="password" placeholder="Create a password" required>
                            </div>
                            <div class="password-strength">
                                <div class="strength-bar" id="strengthBar"></div>
                            </div>
                            <small id="strengthText">Enter a password</small>
                        </div>
                        
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                            </div>
                        </div>
                        
                        <div class="terms-agreement">
                            <label>
                                <input type="checkbox" id="terms" required>
                                I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and 
                                <a href="privacy.html" target="_blank">Privacy Policy</a>
                            </label>
                        </div>
                        
                        <button type="submit" class="auth-button">
                            <i class="fas fa-user-plus"></i> Sign Up
                        </button>
                    </form>
                    
                    <div class="auth-divider">
                        <span>or sign up with</span>
                    </div>
                    
                    <div class="social-auth">
                        <button class="social-btn" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="social-btn" onclick="socialLogin('facebook')">
                            <i class="fab fa-facebook-f"></i> Facebook
                        </button>
                    </div>
                    
                    <p class="auth-footer">
                        Already have an account? <a href="signin.html">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Floating Back to Top -->
    <button class="back-to-top" id="backToTop">
        <i class="fas fa-arrow-up"></i>
    </button>
    
     <!-- Scripts - FIXED: All paths corrected -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/pages/signup.js"></script>

</body>
</html>
