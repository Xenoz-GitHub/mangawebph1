<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - MangaWebPH</title>
    <link rel="icon" type="image/png" href="../images/mangawebph.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
      <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <link rel="stylesheet" href="../css/animations.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, rgba(108,92,231,0.1) 0%, rgba(0,210,211,0.1) 100%);
            position: relative;
            overflow: hidden;
        }

        .auth-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('../images/mangawebph.png') no-repeat center center;
            background-size: cover;
            opacity: 0.05;
        }

        .auth-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
        }

        body.night-mode .auth-container {
            background: var(--card-bg-dark);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .auth-side {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .auth-side::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        .auth-side-content {
            position: relative;
            z-index: 1;
        }

        .auth-side h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .auth-side p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .auth-side-image {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.3);
            margin: 2rem 0;
            animation: float 6s ease-in-out infinite;
        }

        .auth-form-container {
            padding: 4rem;
        }

        .auth-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .auth-form h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-subtitle {
            color: #666;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: transparent;
        }

        body.night-mode .input-group input {
            border-color: rgba(255,255,255,0.1);
            color: white;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 4px rgba(108,92,231,0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .auth-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .auth-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108,92,231,0.3);
        }

        .auth-divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: rgba(0,0,0,0.1);
        }

        body.night-mode .auth-divider::before,
        body.night-mode .auth-divider::after {
            background: rgba(255,255,255,0.1);
        }

        .auth-divider::before {
            left: 0;
        }

        .auth-divider::after {
            right: 0;
        }

        .auth-divider span {
            background: white;
            padding: 0 1rem;
            color: #666;
            position: relative;
        }

        body.night-mode .auth-divider span {
            background: var(--card-bg-dark);
            color: #999;
        }

        .social-auth {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .social-btn {
            padding: 0.8rem;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 15px;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        body.night-mode .social-btn {
            border-color: rgba(255,255,255,0.1);
            color: white;
        }

        .social-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .social-btn i {
            font-size: 1.2rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: #666;
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .auth-container {
                grid-template-columns: 1fr;
            }
            
            .auth-side {
                display: none;
            }
            
            .auth-form-container {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <!-- Left Side with Luffy -->
            <div class="auth-side">
                <div class="auth-side-content">
                    <h2>Welcome Back!</h2>
                    <p>Continue your manga journey with us</p>
                    <img src="../images/luffy.png" alt="Luffy" class="auth-side-image">
                    <div class="floating-elements">
                        <div class="floating-element element1"></div>
                        <div class="floating-element element2"></div>
                        <div class="floating-element element3"></div>
                    </div>
                </div>
            </div>
            
            <!-- Right Side - Sign In Form -->
            <div class="auth-form-container">
                <div class="auth-form">
                    <h1>Sign In</h1>
                    <p class="auth-subtitle">Welcome back! Please sign in to continue.</p>
                    
                    <form id="signinForm">
                        <div class="form-group">
                            <label>Email</label>
                            <div class="input-group">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="email" placeholder="Enter your email" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>Password</label>
                            <div class="input-group">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="password" placeholder="Enter your password" required>
                            </div>
                        </div>
                        
                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox"> Remember me
                            </label>
                            <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
                        </div>
                        
                        <button type="submit" class="auth-button">
                            <i class="fas fa-sign-in-alt"></i> Sign In
                        </button>
                    </form>
                    
                    <div class="auth-divider">
                        <span>or continue with</span>
                    </div>
                    
                    <div class="social-auth">
                        <button class="social-btn" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="social-btn" onclick="socialLogin('facebook')">
                            <i class="fab fa-facebook-f"></i> Facebook
                        </button>
                    </div>
                    
                    <p class="auth-footer">
                        Don't have an account? <a href="signup.html">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Floating Back to Top -->
    <button class="back-to-top" id="backToTop">
        <i class="fas fa-arrow-up"></i>
    </button>
    
       <!-- Scripts - FIXED: All paths corrected -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/pages/signin.js"></script>
</body>
</html>
