<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast Messages - MangaWebPH Admin</title>
    <link rel="icon" type="image/png" href="../../images/mangawebph.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
      <!-- Main CSS (always first) -->
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/mobile.css">
    <link rel="stylesheet" href="../../css/animations.css">
    
    <!-- Admin CSS (add this) -->
    <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="admin-sidebar">
            <!-- ... same sidebar ... -->
        </div>
        
        <!-- Main Content -->
        <div class="admin-main">
            <div class="admin-header">
                <h1 class="admin-title">Broadcast Messages</h1>
                <button class="btn-primary" onclick="showNewMessageModal()">
                    <i class="fas fa-plus"></i> New Broadcast
                </button>
            </div>
            
            <!-- Message History -->
            <div class="messages-history">
                <h2>Previous Broadcasts</h2>
                <div id="messagesList"></div>
            </div>
            
            <!-- New Message Modal -->
            <div class="modal" id="messageModal" style="display: none;">
                <div class="modal-content">
                    <h2>Send Broadcast Message</h2>
                    
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="messageTitle" class="form-control">
                    </div>
                    
                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="messageContent" rows="5" class="form-control"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Send to:</label>
                        <select id="targetAudience">
                            <option value="all">All Users</option>
                            <option value="premium">Premium Users Only</option>
                            <option value="active">Active Users (last 7 days)</option>
                            <option value="specific">Specific Users</option>
                        </select>
                    </div>
                    
                    <div id="userSelection" style="display: none;">
                        <label>Select Users:</label>
                        <select id="userSelect" multiple size="5" class="form-control">
                            <!-- Will be populated with users -->
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="excludeReading"> 
                            Exclude users currently reading (don't disturb readers)
                        </label>
                    </div>
                    
                    <div style="text-align: right; margin-top: 1rem;">
                        <button class="btn-secondary" onclick="closeMessageModal()">Cancel</button>
                        <button class="btn-primary" onclick="sendBroadcast()">Send Message</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
 
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/supabase.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/notifications.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/pages/admin/admin-messages.js"></script>
</body>
</html>
