<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedbacks - MangaWebPH Admin</title>
    <link rel="icon" type="image/png" href="../../images/mangawebph.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
      <!-- Main CSS (always first) -->
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/mobile.css">
    <link rel="stylesheet" href="../../css/animations.css">
    
    <!-- Admin CSS (add this) -->
    <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div class="admin-sidebar">
            <!-- ... same sidebar ... -->
        </div>
        
        <!-- Main Content -->
        <div class="admin-main">
            <div class="admin-header">
                <h1 class="admin-title">User Feedbacks</h1>
                <div class="filters">
                    <select id="statusFilter">
                        <option value="all">All Feedbacks</option>
                        <option value="pending">Pending</option>
                        <option value="replied">Replied</option>
                        <option value="archived">Archived</option>
                    </select>
                </div>
            </div>
            
            <div class="feedbacks-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Message</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="feedbacksList"></tbody>
                </table>
            </div>
            
            <!-- Reply Modal -->
            <div class="modal" id="replyModal" style="display: none;">
                <div class="modal-content">
                    <h2>Reply to Feedback</h2>
                    
                    <div id="feedbackDetails"></div>
                    
                    <textarea id="replyMessage" rows="5" placeholder="Type your reply..."></textarea>
                    
                    <div style="text-align: right; margin-top: 1rem;">
                        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                        <button class="btn-primary" onclick="sendReply()">Send Reply</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
 
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/config.js"></script>
    <script src="../../js/supabase.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/notifications.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/pages/admin/admin-feedbacks.js"></script>
</body>
</html>
