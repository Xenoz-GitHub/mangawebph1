<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Downloads - MangaWebPH</title>
    <link rel="icon" type="image/png" href="../images/mangawebph.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <link rel="stylesheet" href="../css/animations.css">
    <style>
        .downloads-page {
            padding: 100px 2rem 4rem;
            min-height: 100vh;
        }

        .downloads-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .page-header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .storage-info {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 1.5rem 2rem;
            border-radius: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .storage-stats {
            display: flex;
            gap: 2rem;
        }

        .storage-stat {
            text-align: center;
        }

        .storage-stat .value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .storage-stat .label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .storage-bar {
            width: 200px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .storage-bar-fill {
            height: 100%;
            background: white;
            width: 0%;
            transition: width 0.3s ease;
        }

        .filters-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.8rem 1.5rem;
            border: 2px solid rgba(108,92,231,0.2);
            border-radius: 30px;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-color: transparent;
        }

        .downloads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .download-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
        }

        body.night-mode .download-card {
            background: var(--card-bg-dark);
        }

        .download-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(108,92,231,0.2);
        }

        .download-header {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .download-cover {
            width: 80px;
            height: 100px;
            border-radius: 10px;
            overflow: hidden;
        }

        .download-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .download-info {
            flex: 1;
        }

        .download-info h3 {
            margin-bottom: 0.3rem;
        }

        .download-meta {
            display: flex;
            gap: 1rem;
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .download-meta i {
            color: var(--primary);
            margin-right: 0.3rem;
        }

        .chapters-list {
            max-height: 200px;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .chapter-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 1px solid var(--border-color);
        }

        .chapter-item:hover {
            background: rgba(108,92,231,0.05);
        }

        .chapter-info h4 {
            font-size: 0.95rem;
        }

        .chapter-info p {
            font-size: 0.8rem;
            color: #666;
        }

        .chapter-actions {
            display: flex;
            gap: 0.5rem;
        }

        .chapter-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chapter-btn.read {
            background: var(--primary);
            color: white;
        }

        .chapter-btn.read:hover {
            transform: scale(1.1);
        }

        .chapter-btn.delete {
            background: rgba(214,48,49,0.1);
            color: #d63031;
        }

        .chapter-btn.delete:hover {
            background: #d63031;
            color: white;
        }

        .download-footer {
            padding: 1rem;
            background: rgba(108,92,231,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .download-stats {
            display: flex;
            gap: 1rem;
            color: #666;
            font-size: 0.9rem;
        }

        .download-actions {
            display: flex;
            gap: 0.5rem;
        }

        .download-action-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .download-action-btn.read-all {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
        }

        .download-action-btn.delete-all {
            background: rgba(214,48,49,0.1);
            color: #d63031;
        }

        .download-action-btn:hover {
            transform: translateY(-2px);
        }

        .empty-downloads {
            text-align: center;
            padding: 4rem;
            grid-column: 1/-1;
        }

        .empty-downloads i {
            font-size: 5rem;
            color: #ccc;
            margin-bottom: 1rem;
        }

        .empty-downloads h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .empty-downloads p {
            color: #666;
            margin-bottom: 2rem;
        }

        .progress-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .progress-badge.completed {
            background: #00b894;
            color: white;
        }

        .progress-badge.in-progress {
            background: #fdcb6e;
            color: #2d3436;
        }

        @media (max-width: 768px) {
            .downloads-page {
                padding: 80px 1rem 2rem;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .storage-info {
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
            }

            .storage-bar {
                width: 100%;
            }

            .downloads-grid {
                grid-template-columns: 1fr;
            }

            .download-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .download-cover {
                width: 120px;
                height: 160px;
            }

            .download-footer {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <div class="logo">
                    <img src="../images/logo.png" alt="MangaWebPH Logo" class="circular-logo">
                    <span class="logo-text">MangaWebPH</span>
                </div>
            </div>
            
            <div class="nav-center" id="navLinks">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="manga.html" class="nav-link">Manga</a>
                <a href="leaderboard.html" class="nav-link">Leaderboard</a>
                <a href="tasks.html" class="nav-link">Tasks</a>
                <a href="donate.html" class="nav-link">Donate</a>
            </div>
            
            <div class="nav-right">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="auth-buttons" id="authButtons">
                    <a href="signin.html" class="btn-secondary">Sign In</a>
                    <a href="signup.html" class="btn-primary">Sign Up</a>
                </div>
                <div class="user-menu hidden" id="userMenu">
                    <img src="../images/default-avatar.png" alt="User" class="user-avatar circular-avatar" id="userAvatar">
                    <div class="user-dropdown">
                        <a href="profile.html">Profile</a>
                        <a href="dashboard.html">Dashboard</a>
                        <a href="downloads.html" class="active">Downloads</a>
                        <a href="#" id="logoutBtn">Logout</a>
                    </div>
                </div>
                <button class="burger-menu" id="burgerMenu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="../index.html" class="mobile-link">Home</a>
        <a href="manga.html" class="mobile-link">Manga</a>
        <a href="leaderboard.html" class="mobile-link">Leaderboard</a>
        <a href="tasks.html" class="mobile-link">Tasks</a>
        <a href="donate.html" class="mobile-link">Donate</a>
        <a href="profile.html" class="mobile-link">Profile</a>
        <a href="dashboard.html" class="mobile-link">Dashboard</a>
        <a href="downloads.html" class="mobile-link">Downloads</a>
    </div>

    <main class="downloads-page">
        <div class="downloads-container">
            <div class="page-header">
                <h1><i class="fas fa-download"></i> My Downloads</h1>
                <div class="storage-info" id="storageInfo">
                    <div class="storage-stats">
                        <div class="storage-stat">
                            <div class="value" id="mangaCount">0</div>
                            <div class="label">Manga</div>
                        </div>
                        <div class="storage-stat">
                            <div class="value" id="chapterCount">0</div>
                            <div class="label">Chapters</div>
                        </div>
                        <div class="storage-stat">
                            <div class="value" id="totalSize">0 MB</div>
                            <div class="label">Used</div>
                        </div>
                    </div>
                    <div class="storage-bar">
                        <div class="storage-bar-fill" id="storageBar" style="width: 0%;"></div>
                    </div>
                </div>
            </div>

            <div class="filters-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="reading">Currently Reading</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
                <button class="filter-btn" data-filter="pending">Not Started</button>
            </div>

            <div class="downloads-grid" id="downloadsGrid">
                <!-- Downloads will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Floating Components -->
    <div class="chatbot-container" id="chatbotContainer">
        <!-- Chatbot HTML -->
    </div>
    
    <button class="back-to-top" id="backToTop">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/chatbot.js"></script>
    <script src="../js/pages/downloads.js"></script>
</body>
</html>
