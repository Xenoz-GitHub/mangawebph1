<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collections - MangaWebPH</title>
    <link rel="icon" type="image/png" href="../images/mangawebph.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <link rel="stylesheet" href="../css/animations.css">
    <style>
        .collections-page {
            padding: 100px 2rem 4rem;
            min-height: 100vh;
        }
        
        .collections-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 2rem;
        }
        
        .page-header h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .create-collection-btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .create-collection-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(108,92,231,0.3);
        }
        
        .collections-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }
        
        body.night-mode .stat-card {
            background: var(--card-bg-dark);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .collections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }
        
        .collection-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            position: relative;
        }
        
        body.night-mode .collection-card {
            background: var(--card-bg-dark);
        }
        
        .collection-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 30px rgba(108,92,231,0.2);
        }
        
        .collection-cover {
            height: 120px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            position: relative;
            overflow: hidden;
        }
        
        .collection-icon {
            position: absolute;
            bottom: -30px;
            left: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 3px solid white;
        }
        
        .collection-info {
            padding: 2rem 1.5rem 1.5rem;
        }
        
        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        
        .collection-name {
            font-size: 1.3rem;
            font-weight: 600;
        }
        
        .collection-badge {
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .badge-public {
            background: #00b894;
            color: white;
        }
        
        .badge-private {
            background: #d63031;
            color: white;
        }
        
        .collection-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .collection-meta {
            display: flex;
            gap: 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        
        .collection-meta i {
            color: var(--primary-color);
            margin-right: 0.3rem;
        }
        
        .collection-preview {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        
        .preview-item {
            width: 50px;
            height: 70px;
            border-radius: 8px;
            overflow: hidden;
            background: #f0f0f0;
        }
        
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .preview-more {
            width: 50px;
            height: 70px;
            border-radius: 8px;
            background: rgba(108,92,231,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .collection-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        
        .collection-action-btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 8px;
            background: rgba(108,92,231,0.1);
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }
        
        .collection-action-btn:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .collection-action-btn.delete:hover {
            background: #d63031;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        body.night-mode .modal-content {
            background: var(--card-bg-dark);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid rgba(108,92,231,0.2);
            border-radius: 15px;
            background: transparent;
            transition: all 0.3s ease;
        }
        
        body.night-mode .form-group input,
        body.night-mode .form-group select,
        body.night-mode .form-group textarea {
            color: white;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary-color);
            outline: none;
        }
        
        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }
        
        .icon-selector {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
        }
        
        .icon-option {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            border: 2px solid rgba(108,92,231,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .icon-option:hover,
        .icon-option.selected {
            background: var(--primary-color);
            color: white;
            border-color: transparent;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem;
            grid-column: 1/-1;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: #ccc;
            margin-bottom: 1rem;
        }
        
        .loading-skeleton {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .skeleton-card {
            height: 300px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 20px;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        @media (max-width: 768px) {
            .collections-page {
                padding: 80px 1rem 2rem;
            }
            
            .page-header h1 {
                font-size: 2rem;
            }
            
            .collections-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation (same as favorites.html) -->
    <nav class="navbar"><!-- ... --></nav>
    
    <!-- Mobile Menu (same as favorites.html) -->
    <div class="mobile-menu" id="mobileMenu"><!-- ... --></div>

    <main class="collections-page">
        <div class="collections-container">
            <div class="page-header">
                <h1><i class="fas fa-folder"></i> My Collections</h1>
                <button class="create-collection-btn" onclick="openCreateModal()">
                    <i class="fas fa-plus"></i> Create Collection
                </button>
            </div>
            
            <!-- Stats -->
            <div class="collections-stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalCollections">0</div>
                    <div class="stat-label">Total Collections</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="publicCollections">0</div>
                    <div class="stat-label">Public</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalItems">0</div>
                    <div class="stat-label">Total Items</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="followers">0</div>
                    <div class="stat-label">Followers</div>
                </div>
            </div>
            
            <!-- Collections Grid -->
            <div class="collections-grid" id="collectionsGrid">
                <div class="loading-skeleton">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Create Collection Modal -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <h2>Create New Collection</h2>
            
            <div class="form-group">
                <label>Collection Name</label>
                <input type="text" id="collectionName" placeholder="e.g., My Favorite Manga" required>
            </div>
            
            <div class="form-group">
                <label>Description (Optional)</label>
                <textarea id="collectionDesc" rows="3" placeholder="Describe your collection..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Choose Icon</label>
                <div class="icon-selector" id="iconSelector">
                    <div class="icon-option" data-icon="fa-heart"><i class="fas fa-heart"></i></div>
                    <div class="icon-option" data-icon="fa-star"><i class="fas fa-star"></i></div>
                    <div class="icon-option" data-icon="fa-crown"><i class="fas fa-crown"></i></div>
                    <div class="icon-option" data-icon="fa-fire"><i class="fas fa-fire"></i></div>
                    <div class="icon-option" data-icon="fa-dragon"><i class="fas fa-dragon"></i></div>
                    <div class="icon-option" data-icon="fa-robot"><i class="fas fa-robot"></i></div>
                    <div class="icon-option" data-icon="fa-skull"><i class="fas fa-skull"></i></div>
                    <div class="icon-option" data-icon="fa-gem"><i class="fas fa-gem"></i></div>
                    <div class="icon-option" data-icon="fa-mask"><i class="fas fa-mask"></i></div>
                    <div class="icon-option" data-icon="fa-clock"><i class="fas fa-clock"></i></div>
                </div>
            </div>
            
            <div class="form-group">
                <label>Visibility</label>
                <select id="collectionVisibility">
                    <option value="public">Public - Anyone can see</option>
                    <option value="private">Private - Only me</option>
                </select>
            </div>
            
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeCreateModal()">Cancel</button>
                <button class="btn-primary" onclick="createCollection()">Create</button>
            </div>
        </div>
    </div>

    <!-- Floating Components -->
    <div class="chatbot-container" id="chatbotContainer"><!-- ... --></div>
    <button class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></button>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/chatbot.js"></script>
    <script src="../js/pages/collections.js"></script>
</body>
</html>
